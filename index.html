<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Redirect</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #f8fafc 0%, #eef2f7 55%, #e8edf5 100%);
    }
    .wrap {
      width: min(92vw, 700px);
      text-align: center;
      padding: 28px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 14px 40px rgba(16, 24, 40, 0.12);
      backdrop-filter: blur(4px);
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 20px 24px;
      border: 1px solid #d0d7e2;
      border-radius: 14px;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.01em;
      outline: none;
      background: #fff;
      color: #0f172a;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 120ms ease;
    }
    input:focus {
      border-color: #5b9dff;
      box-shadow: 0 0 0 4px rgba(91, 157, 255, 0.2);
      transform: translateY(-1px);
    }
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #475569;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Type search keyword and press Enter"
        autocomplete="off"
        autofocus
      />
    </form>
    <div class="hint" id="hint"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    // URL template. Example: https://www.google.com/search?q=%
    const targetTemplate =
      params.get("url") || "https://www.google.com/search?q=%";

    // Replace token inside template with encoded input text.
    const token = params.get("token") || "%";

    const form = document.getElementById("search-form");
    const input = document.getElementById("search-input");
    const hint = document.getElementById("hint");

    hint.textContent = `Search To ${targetTemplate}`;

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const raw = input.value.trim();
      if (!raw) return;

      const encoded = encodeURIComponent(raw);
      const replacementTokens = Array.from(
        new Set([token, "%", "{query}"].filter(Boolean))
      );

      let nextUrl = targetTemplate;
      let replaced = false;

      for (const replacementToken of replacementTokens) {
        if (nextUrl.includes(replacementToken)) {
          nextUrl = nextUrl.split(replacementToken).join(encoded);
          replaced = true;
        }
      }

      if (!replaced) {
        nextUrl = `${targetTemplate}${encoded}`;
      }

      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
