<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Redirect</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    .wrap {
      width: min(90vw, 480px);
      text-align: center;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: #111;
    }
    input:focus {
      border-color: #5b9dff;
      box-shadow: 0 0 0 3px rgba(91, 157, 255, 0.2);
    }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Type search keyword and press Enter"
        autocomplete="off"
        autofocus
      />
    </form>
    <div class="hint" id="hint"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    // URL template. Example: https://www.google.com/search?q=%
    const targetTemplate =
      params.get("url") || "https://www.google.com/search?q=%";

    // Replace token inside template with encoded input text.
    const token = params.get("token") || "%";

    const form = document.getElementById("search-form");
    const input = document.getElementById("search-input");
    const hint = document.getElementById("hint");

    hint.textContent = `template: ${targetTemplate} | token: ${token}`;

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const raw = input.value.trim();
      if (!raw) return;

      const encoded = encodeURIComponent(raw);
      const replacementTokens = Array.from(
        new Set([token, "%", "{query}"].filter(Boolean))
      );

      let nextUrl = targetTemplate;
      let replaced = false;

      for (const replacementToken of replacementTokens) {
        if (nextUrl.includes(replacementToken)) {
          nextUrl = nextUrl.split(replacementToken).join(encoded);
          replaced = true;
        }
      }

      if (!replaced) {
        nextUrl = `${targetTemplate}${encoded}`;
      }

      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
