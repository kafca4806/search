<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Redirect</title>
  <link rel="icon" href="https://www.google.com/s2/favicons?sz=64&domain=google.com" />
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background-color: #edf2f8;
      background-image: radial-gradient(circle, rgba(71, 85, 105, 0.22) 1.2px, transparent 1.2px);
      background-size: 21px 21px;
    }
    .wrap {
      width: min(92vw, 840px);
      text-align: center;
      padding: 34px 34px 17px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 17px 48px rgba(16, 24, 40, 0.12);
      backdrop-filter: blur(4px);
    }
    #search-form {
      margin: 0;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 24px 29px;
      border: 1px solid #d0d7e2;
      border-radius: 17px;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 0.01em;
      outline: none;
      background: #fff;
      color: #0f172a;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 120ms ease;
    }
    input:focus {
      border-color: #5b9dff;
      box-shadow: 0 0 0 5px rgba(91, 157, 255, 0.2);
      transform: translateY(-1px);
    }
    .hint {
      margin-top: 17px;
      font-size: 14px;
      color: #475569;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Search..."
        autocomplete="off"
        autofocus
      />
    </form>
    <div class="hint" id="hint"></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    // URL template. Example: https://www.google.com/search?q=%
    const targetTemplate =
      params.get("url") || "https://www.google.com/search?q=%";

    // Replace token inside template with encoded input text.
    const token = params.get("token") || "%";

    const resolveDomainFromTemplate = (template) => {
      const probe = [token, "%", "{query}"].find((t) => template.includes(t));
      const sampleUrl = probe
        ? template.split(probe).join("sample")
        : template;

      try {
        return new URL(sampleUrl).hostname;
      } catch {
        return "";
      }
    };

    const targetDomain = resolveDomainFromTemplate(targetTemplate);
    if (targetDomain) {
      const faviconHref = `https://www.google.com/s2/favicons?sz=64&domain=${targetTemplate}`;
      const iconLink = document.querySelector("link[rel='icon']") || document.createElement("link");
      iconLink.setAttribute("rel", "icon");
      iconLink.setAttribute("href", faviconHref);
      if (!iconLink.parentNode) {
        document.head.appendChild(iconLink);
      }
    }

    const form = document.getElementById("search-form");
    const input = document.getElementById("search-input");
    const hint = document.getElementById("hint");

    hint.textContent = `Search to ${targetTemplate}`;

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const raw = input.value.trim();
      if (!raw) return;

      const encoded = encodeURIComponent(raw);
      const replacementTokens = Array.from(
        new Set([token, "%", "{query}"].filter(Boolean))
      );

      let nextUrl = targetTemplate;
      let replaced = false;

      for (const replacementToken of replacementTokens) {
        if (nextUrl.includes(replacementToken)) {
          nextUrl = nextUrl.split(replacementToken).join(encoded);
          replaced = true;
        }
      }

      if (!replaced) {
        nextUrl = `${targetTemplate}${encoded}`;
      }

      window.location.href = nextUrl;
    });
  </script>
</body>
</html>
